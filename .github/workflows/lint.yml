name: Lint

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    name: Validate marketplace
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse marketplace.json
        run: |
          set -e
          node -e "JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'))"
          node -e "
            const m = JSON.parse(require('fs').readFileSync('.claude-plugin/marketplace.json','utf8'));
            if (!m.name) { throw new Error('marketplace.json missing name'); }
            if (!m.owner || !m.owner.name) { throw new Error('marketplace.json missing owner.name'); }
            if (!Array.isArray(m.plugins) || m.plugins.length === 0) { throw new Error('marketplace.json missing plugins[]'); }
            for (const p of m.plugins) {
              if (!p.name) { throw new Error('plugin entry missing name'); }
              if (!p.source) { throw new Error(p.name + ' missing source'); }
            }
          "

      - name: Parse plugin.json and validate skills
        run: |
          set -e
          node -e "JSON.parse(require('fs').readFileSync('plugins/owlmetry/.claude-plugin/plugin.json','utf8'))"
          fail=0
          for skill in plugins/owlmetry/skills/*/; do
            name=$(basename "$skill")
            file="$skill/SKILL.md"
            echo "Checking $file"
            if [ ! -f "$file" ]; then
              echo "  MISSING: $file"
              fail=1
              continue
            fi
            head -n 20 "$file" | grep -q "^name: $name$" || { echo "  frontmatter missing: name: $name"; fail=1; }
            head -n 20 "$file" | grep -q "^description:" || { echo "  frontmatter missing: description:"; fail=1; }
          done
          exit $fail
